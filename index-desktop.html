<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0b08">
<title>永乐秘闻录</title>
<link rel="stylesheet" href="prototype.css">
</head>
<body>

<!-- ================= 1. 主界面（全屏场景 + 悬浮 UI） ================= -->
<section class="page active" id="page-home">
  <!-- 全屏场景底图 -->
  <div class="scene-bg" id="sceneWrap"></div>
  <div class="scene-shade"></div>

  <!-- 顶部悬浮细条 -->
  <header class="home-header">
    <img class="logo" src="assets/ui/gen/logo-clean.png" alt="永乐秘闻录">
    <div class="loc-bar"></div>
    <button class="btn-gear" data-go="page-menu"><img src="assets/kit/icons/top/settings.png" alt="设置"></button>
  </header>

  <!-- 地图悬浮钮（占位） -->
  <button class="map-float" id="btn-map-float">
    <img src="assets/kit/icons/top/map.png" alt=""><span>地图</span>
  </button>

  <!-- 右侧任务/线索纸卷面板 -->
  <aside class="quest-panel" id="questPanel">
    <div class="qs-body">
      <div class="qs-title">当前任务</div>
      <div class="qs-quest" id="qsQuest"></div>
      <div class="qs-title" style="margin-top:10px">线索收集</div>
      <div class="scroll-list qs-clues" id="qsClues"></div>
    </div>
    <button class="qs-toggle" id="qsToggle"><img src="assets/kit/buttons/arrow-right.png" alt="收起"></button>
  </aside>

  <!-- 隐藏的功能元素（逻辑保留） -->
  <div id="sceneTitle" hidden></div>
  <div id="sceneText" hidden></div>
  <button id="btn-observe" hidden></button>

  <!-- 中下部：旁白对话框（带立绘）+ 建议 + 输入 -->
  <div class="home-dock">
    <div class="dlg" id="dlgBox">
      <div class="dlg-portrait" id="dlgPortrait" hidden></div>
      <div class="dlg-name" id="dlgName">旁白</div>
      <div class="narrate-body" id="narrate"></div>
      <button class="dlg-expand" id="dlgExpand">展开 ▾</button>
    </div>
    <div id="suggestRow" class="suggest-row"></div>
    <div class="input-row">
      <div class="input-box"><input id="action-input" type="text" placeholder="请输入你的行动…"></div>
      <button class="btn-send" id="btn-send">发送</button>
    </div>
  </div>

  <nav class="navbar">
    <button class="nav-item" data-go="page-bag"><img src="assets/kit/icons/nav/bag.png" alt="">背包</button>
    <button class="nav-item" data-go="page-quest"><img src="assets/kit/icons/nav/quest.png" alt="">任务</button>
    <button class="nav-item hero" data-go="page-case"><img src="assets/kit/icons/nav/case.png" alt="">案件板</button>
    <button class="nav-item" data-go="page-people"><img src="assets/kit/icons/nav/people.png" alt="">人物</button>
    <button class="nav-item" data-go="page-notes"><img src="assets/kit/icons/nav/notes.png" alt="">笔记</button>
  </nav>
</section>

<!-- ================= 2. 菜单页 ================= -->
<section class="page" id="page-menu">
  <header class="home-header">
    <img class="logo" src="assets/ui/gen/logo-clean.png" alt="永乐秘闻录">
    <button class="btn-gear" data-go="page-home"><img src="assets/kit/icons/common/close.png" alt="关闭"></button>
  </header>
  <div class="loc-bar"></div>

  <div class="scroll">
    <div class="menu-list">
      <button class="menu-item" data-go="page-bag">
        <img class="mi-icon" src="assets/kit/icons/nav/bag.png" alt="">
        <span class="mi-text"><span class="mi-name">背包</span><span class="mi-sub">查看你持有的物品</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" data-go="page-quest">
        <img class="mi-icon" src="assets/kit/icons/nav/quest.png" alt="">
        <span class="mi-text"><span class="mi-name">任务</span><span class="mi-sub">查看当前任务进度</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" data-go="page-case">
        <img class="mi-icon" src="assets/kit/icons/nav/case.png" alt="">
        <span class="mi-text"><span class="mi-name">案件板</span><span class="mi-sub">查看线索与推理关系</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" data-go="page-people">
        <img class="mi-icon" src="assets/kit/icons/nav/people.png" alt="">
        <span class="mi-text"><span class="mi-name">人物</span><span class="mi-sub">查看人物关系与信息</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" data-go="page-notes">
        <img class="mi-icon" src="assets/kit/icons/nav/notes.png" alt="">
        <span class="mi-text"><span class="mi-name">笔记</span><span class="mi-sub">查看已记录的笔记</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" id="m-map">
        <img class="mi-icon" src="assets/kit/icons/top/map.png" alt="">
        <span class="mi-text"><span class="mi-name">地图</span><span class="mi-sub">查看已探索的地图</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" id="m-save">
        <img class="mi-icon" src="assets/kit/icons/top/save.png" alt="">
        <span class="mi-text"><span class="mi-name">存档</span><span class="mi-sub">保存或读取游戏进度</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" id="m-fish">
        <img class="mi-icon" src="assets/kit/icons/top/settings.png" alt="">
        <span class="mi-text"><span class="mi-name">摸鱼模式</span><span class="mi-sub" id="m-fish-sub">伪装成朴素备忘录</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
      <button class="menu-item" id="m-restart">
        <img class="mi-icon" src="assets/kit/icons/common/close.png" alt="">
        <span class="mi-text"><span class="mi-name" style="color:#c96">重新开始</span><span class="mi-sub">清除存档，从头开始游戏</span></span>
        <img class="mi-arrow" src="assets/kit/buttons/arrow-right.png" alt="">
      </button>
    </div>
    <button class="kbtn block" data-go="page-home" style="height:46px;margin-top:16px">返回游戏</button>
    <div style="height:20px"></div>
  </div>
</section>

<!-- ================= 3. 任务页 ================= -->
<section class="page" id="page-quest">
  <header class="sub-header">
    <button class="btn-back" data-go="page-home"><img src="assets/kit/buttons/arrow-right.png" alt="返回"></button>
    <div class="sub-title">任务</div>
  </header>
  <div class="scroll">
    <div class="sect">
      <div class="sect-head"><img src="assets/kit/icons/nav/quest.png" alt="">任务</div>
      <div class="card quest-card" style="margin:0">
        <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
        <div class="quest-line"><span class="quest-tag">主线</span><span id="qMain">…</span></div>
        <div class="quest-sub" id="qSub"></div>
        <div class="quest-sub" id="qProgress" style="margin-left:0;opacity:.7"></div>
      </div>
    </div>

    <div class="sect">
      <div class="sect-head"><img src="assets/kit/icons/common/clue.png" alt="">线索</div>
      <div class="scroll-list" id="qClues"></div>
    </div>

    <div class="sect">
      <div class="sect-head"><img src="assets/kit/icons/nav/people.png" alt="">人物关系</div>
      <div class="scroll-list" id="qRels"></div>
      <button class="kbtn block" data-go="page-people" style="margin:10px 0 0;width:100%">查看全部关系</button>
    </div>
    <div style="height:20px"></div>
  </div>
</section>

<!-- ================= 4. 背包 ================= -->
<section class="page" id="page-bag">
  <header class="sub-header">
    <button class="btn-back" data-go="page-home"><img src="assets/kit/buttons/arrow-right.png" alt="返回"></button>
    <div class="sub-title">背包</div>
  </header>
  <div class="tabs" id="bagTabs">
    <button class="tab on" data-filter="all">全部</button>
    <button class="tab" data-filter="item">道具</button>
  </div>
  <div class="scroll">
    <div class="bag-grid" id="bagGrid"></div>
  </div>
  <div class="bag-actions">
    <button class="kbtn" id="bag-use">使用</button>
    <button class="kbtn" id="bag-view">查看</button>
    <button class="kbtn" id="bag-drop">丢弃</button>
  </div>
</section>

<!-- ================= 5. 案件板 ================= -->
<section class="page" id="page-case">
  <header class="sub-header">
    <button class="btn-back" data-go="page-home"><img src="assets/kit/buttons/arrow-right.png" alt="返回"></button>
    <div class="sub-title">案件板</div>
  </header>
  <div class="case-board" id="case-board"></div>
  <button class="kbtn block" id="case-refresh" style="flex:0 0 auto;margin:0 10px calc(12px + env(safe-area-inset-bottom));width:calc(100% - 20px)">整理线索</button>
</section>

<!-- ================= 6. 笔记 ================= -->
<section class="page" id="page-notes">
  <header class="sub-header">
    <button class="btn-back" data-go="page-home"><img src="assets/kit/buttons/arrow-right.png" alt="返回"></button>
    <div class="sub-title">笔记</div>
  </header>
  <div class="tabs" id="noteTabs">
    <button class="tab on" data-filter="all">全部</button>
    <button class="tab" data-filter="fav">已收藏</button>
  </div>
  <div class="scroll" id="notesList"></div>
  <button class="kbtn block" id="note-new" style="flex:0 0 auto;margin:0 10px calc(12px + env(safe-area-inset-bottom));width:calc(100% - 20px)">新建笔记</button>
</section>

<!-- ================= 7. 人物页（含角色状态栏） ================= -->
<section class="page" id="page-people">
  <header class="sub-header">
    <button class="btn-back" data-go="page-home"><img src="assets/kit/buttons/arrow-right.png" alt="返回"></button>
    <div class="sub-title">人物</div>
  </header>
  <div class="tabs" id="peopleTabs">
    <button class="tab on" data-filter="all">全部</button>
    <button class="tab" data-filter="met">已相遇</button>
    <button class="tab" data-filter="unmet">未相遇</button>
  </div>
  <div class="scroll" id="peopleList"></div>
  <button class="kbtn block" data-go="page-case" style="flex:0 0 auto;margin:0 10px 8px;width:calc(100% - 20px)">查看关系图谱</button>
  <div class="status-bar">
    <div class="sb-player">
      <img src="assets/people/许七安.png" alt="许七安">
      <div>
        <div class="sb-name">许七安</div>
        <div class="sb-sub" id="sbIdentity">龙虎山弟子</div>
        <div class="hp-row">
          <span class="hp-label">气血</span>
          <span class="hp-num" id="sbHpNum">100/100</span>
        </div>
        <div class="hp-bar"><i id="sbHpBar"></i></div>
      </div>
    </div>
    <div class="sb-stats" id="sbStats"></div>
  </div>
</section>

<!-- ================= 通用弹层 ================= -->
<div id="modal" class="modal" hidden>
  <div class="modal-box">
    <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- ================= 横屏提示 ================= -->
<div id="rotate-tip">
  <div class="tip-frame">
    <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
    <img class="tip-logo" src="assets/ui/gen/logo-clean.png" alt="永乐秘闻录">
    <div class="phone"></div>
    <h2>请旋转手机</h2>
    <p>本作需竖屏游玩</p>
  </div>
</div>

<script src="config.local.js"></script>
<script src="story-data.js"></script>
<script src="game.js"></script>

</body>
</html>
